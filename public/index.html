<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORM">
<meta name="theme-color" content="#08090b">
<link rel="manifest" href="manifest.json">
<title>FORM Body Lab</title>
<style>
:root{--bg:#08090b;--panel:#14161a;--panel2:#1b1e24;--line:rgba(255,255,255,.1);--text:#f6f2ea;--muted:#918d84;--accent:#d8ff63;--blue:#69a7ff;--green:#24c693;--orange:#d7892d;--purple:#8c7cf4;--red:#e25b5b}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{max-width:430px;margin:0 auto}.app{min-height:100vh;padding-bottom:74px}.page{display:none;padding:18px 14px 28px}.page.on{display:block}header{padding:22px 2px 12px}.ey{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--accent)}h1{margin:5px 0 6px;font-size:28px;line-height:1.05;letter-spacing:0}.sub{margin:0;color:var(--muted);font-size:13px}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}.hero{background:linear-gradient(145deg,rgba(216,255,99,.14),rgba(105,167,255,.06)),var(--panel);border-color:rgba(216,255,99,.24)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.stack{display:grid;gap:8px}.muted{color:var(--muted)}.small{font-size:12px}.label{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.08em;text-transform:uppercase}.big{font-size:31px;font-weight:850;letter-spacing:0}.pill{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:5px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);font-size:12px;font-weight:800;white-space:nowrap}.pill.ac{background:rgba(216,255,99,.12);border-color:rgba(216,255,99,.32);color:var(--accent)}.pill.bl{background:rgba(105,167,255,.12);border-color:rgba(105,167,255,.28);color:var(--blue)}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;min-height:72px}.metric b{display:block;font-size:18px;margin-bottom:4px}.metric span{color:var(--muted);font-size:11px}.stitle{margin:18px 2px 8px;color:var(--muted);font-size:12px;font-weight:850;letter-spacing:.1em;text-transform:uppercase}.exercise{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:start;padding:12px 0;border-bottom:1px solid var(--line)}.exercise:last-child{border-bottom:0}.num{width:24px;height:24px;border-radius:999px;background:var(--panel2);display:grid;place-items:center;font-size:12px;color:var(--muted);font-weight:850}.exname{font-weight:850;font-size:14px}.exnote{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.35}.sets{font-size:13px;font-weight:850;color:var(--accent);white-space:nowrap}.logrow{display:grid;grid-template-columns:1fr 74px 58px 42px;gap:7px;align-items:center;margin-top:8px}input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px;font:inherit;outline:none}textarea{min-height:82px;resize:vertical}button{border:0;border-radius:11px;background:var(--accent);color:#090a0b;font-weight:850;min-height:42px;padding:0 14px;font:inherit}button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.day{background:var(--panel2);border:1px solid var(--line);border-radius:10px;min-height:76px;padding:7px 5px;font-size:11px}.day b{display:block;font-size:13px;margin:4px 0}.day.today{border-color:rgba(216,255,99,.58);box-shadow:0 0 0 1px rgba(216,255,99,.18)}.push{border-top:3px solid var(--purple)}.pull{border-top:3px solid var(--green)}.shoulder{border-top:3px solid var(--blue)}.legs{border-top:3px solid var(--orange)}.rest{border-top:3px solid var(--muted)}nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,430px);height:64px;background:rgba(8,9,11,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:env(safe-area-inset-bottom)}nav button{background:transparent;color:var(--muted);border-radius:0;min-height:56px;font-size:11px;display:grid;place-items:center}nav button.on{color:var(--accent)}
</style>
</head>
<body>
<main class="app">
<section id="today" class="page on"><header><div class="ey">FORM BODY LAB</div><h1>今天就做清楚</h1><p class="sub" id="todaySub"></p></header><div class="card hero"><div class="row"><div><div class="label">今日训练</div><div class="big" id="todayName"></div><div class="muted small" id="todayTime"></div></div><span class="pill ac" id="todayKcal"></span></div></div><div class="grid3"><div class="metric"><b id="cardioText">40min</b><span>晚上有氧</span></div><div class="metric"><b>90s</b><span>常规休息</span></div><div class="metric"><b>120s</b><span>大重量/RPE8+</span></div></div><div class="stitle">今日动作</div><div class="card" id="todayExercises"></div><button onclick="go('train')">开始训练</button></section>
<section id="train" class="page"><header><div class="ey">TRAINING</div><h1>训练记录</h1><p class="sub">重量、次数、感受，训练中只看必要信息</p></header><div class="card"><div class="row"><b>当前动作</b><select id="exerciseSelect"></select></div><div id="setRows"></div></div><div class="card"><div class="row"><div><div class="label">组间休息</div><div class="big" id="timer">90</div></div><button class="secondary" onclick="startTimer(90)">90s</button><button class="secondary" onclick="startTimer(120)">120s</button></div></div><div class="card stack"><label class="label">训练感受</label><select id="rpe"><option>RPE 7 · 还可以</option><option>RPE 8 · 有压力</option><option>RPE 9 · 接近极限</option></select><textarea id="notes" placeholder="今天状态、泵感、疼痛、下次重量调整"></textarea><button onclick="saveWorkout()">保存训练</button></div></section>
<section id="progress" class="page"><header><div class="ey">PROGRESS</div><h1>只看关键进度</h1><p class="sub">体重、训练完成、PR，不做复杂报告</p></header><div class="grid3"><div class="metric"><b><input id="weight" inputmode="decimal" placeholder="kg" style="padding:0;background:transparent;border:0;font-size:18px;font-weight:850"></b><span>今日体重</span></div><div class="metric"><b id="doneCount">0</b><span>已保存训练</span></div><div class="metric"><b>168g</b><span>蛋白目标</span></div></div><button onclick="saveWeight()">保存体重</button><div class="stitle">本周</div><div class="card"><div class="week" id="weekGrid"></div></div><div class="card stack" id="recentBox"></div></section>
<section id="settings" class="page"><header><div class="ey">SETTINGS</div><h1>设置</h1><p class="sub">复杂功能收起来，需要时再打开</p></header><div class="card stack"><div class="row"><b>训练循环</b><span class="pill">Push → Pull → Shoulder → Legs</span></div><div class="row"><b>周日</b><span class="pill bl">有氧 35min</span></div><div class="row"><b>训练日</b><span class="pill ac">2000 kcal</span></div><div class="row"><b>休息日</b><span class="pill">1800 kcal</span></div></div><div class="card stack"><button class="secondary" onclick="alert('下一步接 Scriptable Widget：读取今日训练、热量、完成状态。')">Widget 数据</button><button class="secondary" onclick="alert('下一步接 iOS 快捷指令：到健身房自动打开 FORM。')">提醒设置</button><button class="secondary" onclick="alert('旧功能入口会在下一版接回，只放在这里，不干扰训练。')">旧功能入口</button></div></section>
</main><nav><button class="on" onclick="go('today',this)">今日</button><button onclick="go('train',this)">训练</button><button onclick="go('progress',this)">进度</button><button onclick="go('settings',this)">设置</button></nav>
<script>
const plans={push:{name:'Push 胸+三头',short:'Push',cls:'push',time:'早 8:00-9:30 力量 · 晚 21:15 有氧40min',kcal:2000,cardio:'40min',ex:[['平板杠铃卧推','肘角75°，留1-2下余量，组间2min','4×8-10'],['双杠臂屈伸','身体前倾15°，下胸主项，组间2min','4×8-10'],['上斜哑铃卧推','30°坡度，锁骨头外延，组间90s','3×10-12'],['低位绳索夹胸','下胸分离度，顶峰停秒，组间90s','3×12'],['蝴蝶机夹胸','胸外沿拉伸，全程控制，组间90s','3×12'],['绳索下压','肘稳定，孤立效率最高，组间90s','3×12-15']]},pull:{name:'Pull 背+二头',short:'Pull',cls:'pull',time:'早 8:00-9:30 力量 · 晚 21:15 有氧40min',kcal:2000,cardio:'40min',ex:[['辅助引体（宽握）','顶部停秒感受背阔收缩，组间2min','4×6-8'],['窄握高位下拉','换角度刺激背阔下束，组间90s','3×10-12'],['宽握坐姿划船','肘外展拉至胸口，上背菱形肌，组间90s','3×10-12'],['窄握坐姿划船','肘贴体侧拉到腹部，中下背，组间90s','3×10-12'],['直臂下压','纯背阔孤立，全程感受拉伸，组间90s','3×15'],['哑铃弯举','二头主项，顶峰旋转，组间90s','3×10-12'],['锤式弯举','肱肌+二头长头，组间90s','2×12']]},shoulder:{name:'Shoulder 肩',short:'Shoulder',cls:'shoulder',time:'早 8:00-9:30 力量 · 晚 21:15 有氧40min',kcal:2000,cardio:'40min',ex:[['绳索侧平举（预疲劳）','激活侧束，组间90s','3×15-20'],['Smith机推肩','侧束参与，组间2min','4×8-10'],['哑铃侧平举','小重量全程，顶部停半秒，组间90s','4×12-15'],['俯身飞鸟','后束主项，组间90s','4×15'],['面拉','后束+外旋保护，组间90s','3×15-20'],['卧姿划船机飞鸟','后束收尾，组间90s','2×15']]},legs:{name:'Legs 腿',short:'Legs',cls:'legs',time:'早 8:00-9:30 力量 · 晚上不走',kcal:2000,cardio:'休息',ex:[['Smith机深蹲（轻重量）','激活股四，不到工作组','2×15'],['倒蹬（腿举）','脚位中高踩安全，组间2min','5×10-12'],['臀推','顶部停2秒挤压，组间2min','4×12'],['腿弯举','离心控制3秒，组间90s','3×12'],['腿屈伸','顶部停秒，股四孤立收尾，组间90s','3×15']]},rest:{name:'休息 + 有氧35min',short:'休息',cls:'rest',time:'周日不练力量 · 有氧35min',kcal:1800,cardio:'35min',ex:[['快走/椭圆机','舒服但出汗，心率可控','35min']]} };
const start='2026-06-22';function dateKey(d){return d.toISOString().slice(0,10)}function typeFor(d){if(d.getDay()===0)return'rest';let startDate=new Date(start+'T00:00:00'),n=Math.round((d-startDate)/86400000),nonRest=0;for(let i=0;i<=n;i++){let x=new Date(startDate);x.setDate(x.getDate()+i);if(x.getDay()!==0)nonRest++}return ['legs','push','pull','shoulder'][(nonRest-1)%4]}function todayPlan(){return plans[typeFor(new Date())]}function render(){let now=new Date(),p=todayPlan(),ds=`${now.getMonth()+1}月${now.getDate()}日 周${'日一二三四五六'[now.getDay()]}`;todaySub.textContent=ds+' · '+p.name;todayName.textContent=p.short;todayTime.textContent=p.time;todayKcal.textContent=p.kcal+' kcal';cardioText.textContent=p.cardio;todayExercises.innerHTML=p.ex.map((e,i)=>`<div class="exercise"><div class="num">${i+1}</div><div><div class="exname">${e[0]}</div><div class="exnote">${e[1]}</div></div><div class="sets">${e[2]}</div></div>`).join('');exerciseSelect.innerHTML=p.ex.map((e,i)=>`<option value="${i}">${e[0]}</option>`).join('');setRows.innerHTML=[1,2,3,4,5].map(i=>`<div class="logrow"><span class="muted small">第 ${i} 组</span><input inputmode="decimal" placeholder="kg" data-w="${i}"><input inputmode="numeric" placeholder="次数" data-r="${i}"><button onclick="startTimer(90)">✓</button></div>`).join('');renderWeek();renderRecent()}function renderWeek(){let now=new Date(),dow=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));weekGrid.innerHTML='';for(let i=0;i<7;i++){let d=new Date(mon);d.setDate(mon.getDate()+i);let p=plans[typeFor(d)],is=dateKey(d)===dateKey(now);weekGrid.innerHTML+=`<div class="day ${p.cls} ${is?'today':''}"><span>${'一二三四五六日'[i]}</span><b>${p.short}</b><span>${d.getMonth()+1}/${d.getDate()}</span></div>`}}function renderRecent(){let logs=JSON.parse(localStorage.form_workouts||'[]');doneCount.textContent=logs.length;recentBox.innerHTML=logs.slice(-4).reverse().map(x=>`<div class="row"><b>${x.date} ${x.plan}</b><span class="pill">${x.rpe.replace(' · ',' ')}</span></div>`).join('')||'<div class="muted small">还没有训练记录</div>';let w=localStorage.form_weight;if(w)weight.value=w}function saveWorkout(){let p=todayPlan(),logs=JSON.parse(localStorage.form_workouts||'[]');logs.push({date:dateKey(new Date()),plan:p.name,rpe:rpe.value,notes:notes.value});localStorage.form_workouts=JSON.stringify(logs);notes.value='';renderRecent();alert('已保存训练')}function saveWeight(){if(weight.value)localStorage.form_weight=weight.value;alert('已保存体重')}let countdown=null;function startTimer(sec){clearInterval(countdown);let left=sec;timer.textContent=left;countdown=setInterval(()=>{left--;timer.textContent=left;if(left<=0){clearInterval(countdown);if(navigator.vibrate)navigator.vibrate([80,40,80])}},1000)}function go(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id===id));document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));(btn||document.querySelectorAll('nav button')[['today','train','progress','settings'].indexOf(id)]).classList.add('on')}render();
</script>
</body>
</html>
